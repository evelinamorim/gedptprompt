# ============================================================
# GED-PT SLM Benchmarking Configuration
# Grammar Error Detection for Brazilian Portuguese
# ============================================================

# --- Model settings ---
model:
  name: "Qwen/Qwen3-8B"              # HuggingFace model ID
  hf_cache: "/projects/F202600026AIVLABDEUCALION/evelinamorim/hf_cache"
  temperature: 0.0
  max_new_tokens: 512                 # overridden dynamically based on sentence length

# --- HuggingFace model IDs for all benchmark models ---
# Use these as --model argument to slurm_eval.sh
models:
  gemma3_12b:   "google/gemma-3-12b-it"
  gemma4_e2b:   "google/gemma-4-e2b-it"         # if available on HF
  qwen3_8b:     "Qwen/Qwen3-8B"
  qwen3_14b:    "Qwen/Qwen3-14B"
  aya_8b:       "CohereForAI/aya-expanse-8b"
  deepseek_7b:  "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
  tucano_2b4:   "TucanoBR/Tucano-2b4-Instruct"

# --- Data settings ---
data:
  test_file:  "data/test_bio.tsv"
  val_file:   "data/val_bio.tsv"
  train_file: "data/train_bio.tsv"
  sentence_delimiter_prefix: "Sentença"

# --- Prompting settings ---
prompting:
  strategy: "zero_shot"             # zero_shot | few_shot
  num_few_shot_examples: 5
  contrastive: true                 # use contrastive few-shot examples
  few_shot_source: "data/train_bio.tsv"

# --- Output settings ---
output:
  predictions_dir: "predictions"
  predictions_file: "predictions/{model_tag}_{split}_{strategy}.json"
  metrics_file: "metrics/{model_tag}_{split}_{strategy}_metrics.json"

# --- Labels ---
labels:
  outside: "O"
  begin_error: "B-WRONG"
  inside_error: "I-WRONG"
  valid_set: ["O", "B-WRONG", "I-WRONG"]

# --- Two-stage settings ---
two_stage:
  hf_cache: "/projects/F202600026AIVLABDEUCALION/evelinamorim/hf_cache"
  max_new_tokens_stage1: 32
  max_new_tokens_stage2: 1024
  batch_size: 0                     # 0 = auto-detect from VRAM